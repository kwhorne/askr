name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build embedded libphp (minimal profile)
        run: ./scripts/build-libphp.sh

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

      - name: release build
        run: cargo build --release

  # Verifies the full Laravel-profile libphp compiles against Ubuntu's system
  # dev libraries (openssl/libxml2/oniguruma/sqlite via pkg-config).
  libphp-laravel-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PHP build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libssl-dev libxml2-dev libonig-dev libsqlite3-dev

      - name: Build libphp (laravel profile)
        run: PROFILE=laravel ./scripts/build-libphp.sh

      - name: Verify non-ZTS + shared object
        run: |
          test -f vendor/php-build/install/lib/libphp.so
          ! grep -q 'define ZTS 1' vendor/php-build/php-*/main/php_config.h
