name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Reads the pinned toolchain + components from rust-toolchain.toml and
      # caches the cargo registry/target keyed on the toolchain + Cargo.lock.
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      # The slowest step is compiling PHP; cache the install keyed on the build
      # script (which pins the PHP version). Skip the build on a cache hit.
      - name: Cache libphp
        id: libphp
        uses: actions/cache@v6
        with:
          path: vendor/php-build/install
          key: libphp-minimal-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-libphp.sh') }}

      - name: Build embedded libphp (minimal profile)
        if: steps.libphp.outputs.cache-hit != 'true'
        run: ./scripts/build-libphp.sh

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

      - name: release build
        run: cargo build --release

  # Verifies the full Laravel-profile libphp compiles against Ubuntu's system
  # dev libraries (openssl/libxml2/oniguruma/sqlite via pkg-config).
  libphp-laravel-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Cache libphp (laravel)
        id: libphp
        uses: actions/cache@v6
        with:
          path: vendor/php-build/install
          key: libphp-laravel-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-libphp.sh') }}

      - name: Install PHP build dependencies
        if: steps.libphp.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libssl-dev libxml2-dev libonig-dev libsqlite3-dev

      - name: Build libphp (laravel profile)
        if: steps.libphp.outputs.cache-hit != 'true'
        run: PROFILE=laravel ./scripts/build-libphp.sh

      - name: Verify non-ZTS + shared object
        run: |
          test -f vendor/php-build/install/lib/libphp.so
          ls vendor/php-build/install/lib/php/extensions/ | grep -q 'non-zts'
