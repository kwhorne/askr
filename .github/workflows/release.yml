name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      # For a tag push this is the tag; for manual dispatch it's the branch the
      # workflow was started from (so it always has the packaging script).
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}

      # Uses the pinned toolchain from rust-toolchain.toml.
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config patchelf \
            libssl-dev libxml2-dev libonig-dev libsqlite3-dev \
            libicu-dev libcurl4-openssl-dev libpng-dev libjpeg-dev \
            libfreetype-dev libwebp-dev libzip-dev zlib1g-dev libpq-dev

      - name: Build embedded libphp (laravel profile)
        run: PROFILE=laravel ./scripts/build-libphp.sh

      - name: Build askr (release)
        run: cargo build --release

      - name: Package self-contained tarball
        run: ./scripts/package-release.sh

      - name: Smoke-test the package (relocated)
        run: |
          mkdir -p /tmp/pkgtest
          tar xzf dist/*.tar.gz -C /tmp/pkgtest
          PKG="$(ls -d /tmp/pkgtest/askr-*)"
          "$PKG/askr" --version
          "$PKG/askr-run.sh" doctor

      # A second, opt-in-features build so users get the durable L2 (SQL Anywhere)
      # and observability tiers without compiling from source. The default tarball
      # above is unchanged.
      - name: Build askr (full — sql-backend + observ + otel + http3)
        run: cargo build --release --features "sql-backend observ otel http3"

      - name: Package full tarball
        run: SUFFIX=-full ./scripts/package-release.sh

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
