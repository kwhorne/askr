name: Docker

# Build and publish the multi-arch GHCR image, packaged from the release tarball
# (no recompile — just fetch + apt). Runs AFTER the Release workflow finishes, so
# the tarball is guaranteed to exist (no race). Also dispatchable by hand.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.4.2)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  image:
    # Only on a successful, tag-triggered Release (or a manual dispatch).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${{ github.event.workflow_run.head_branch }}"
            VER="${VER#v}"
          fi
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "minor=${VER%.*}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            ASKR_VERSION=${{ steps.v.outputs.ver }}
          tags: |
            ghcr.io/kwhorne/askr:${{ steps.v.outputs.ver }}
            ghcr.io/kwhorne/askr:${{ steps.v.outputs.minor }}
            ghcr.io/kwhorne/askr:latest
