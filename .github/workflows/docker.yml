name: Docker

# Build and publish the multi-arch container image to GHCR on each release tag.
# The image is packaged from the release tarball (no recompile), so the build is
# just fetch + apt — the Dockerfile's curl --retry waits for the release job to
# finish uploading the asset.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.4.1)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: v
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${GITHUB_REF#refs/tags/v}"
          fi
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "minor=${VER%.*}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            ASKR_VERSION=${{ steps.v.outputs.ver }}
          tags: |
            ghcr.io/kwhorne/askr:${{ steps.v.outputs.ver }}
            ghcr.io/kwhorne/askr:${{ steps.v.outputs.minor }}
            ghcr.io/kwhorne/askr:latest
