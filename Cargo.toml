[workspace]
resolver = "2"
members = [
    "crates/askr-php",
]

[workspace.package]
version = "0.0.1"
edition = "2021"
license = "MIT"
authors = ["Knut / Wirelabs AS"]
repository = "https://github.com/wirelabs/askr"
rust-version = "1.80"

[workspace.dependencies]
anyhow = "1"
cc = "1"

[profile.release]
lto = "thin"
codegen-units = 1
